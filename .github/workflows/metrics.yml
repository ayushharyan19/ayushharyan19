name: GitHub Metrics
 
on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight
  workflow_dispatch:        # lets you run it manually anytime
  push:
    branches: ["main", "master"]
 
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
 
      # ── MAIN CARD (header + followers + stars) ─────────────────
      - name: Header metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
 
      # ── LANGUAGES ──────────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: Asia/Kolkata
 
      # ── CONTRIBUTION CALENDAR ──────────────────────────────────
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
 
      # ── CODING HABITS ──────────────────────────────────────────
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata
 
      # ── RECENT ACTIVITY ────────────────────────────────────────
      - name: Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, review, release
          config_timezone: Asia/Kolkata
 
      # ── LEETCODE ───────────────────────────────────────────────
      - name: LeetCode
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.leetcode.svg
          token: NOT_NEEDED
          template: terminal
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: ayushharyan19
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 6
          plugin_leetcode_limit_recent: 3
          config_timezone: Asia/Kolkata
 
      # ── ACHIEVEMENTS ───────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          config_timezone: Asia/Kolkata
 
