name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── MAIN CARD ──────────────────────────────────────────────
      - name: Header metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          extras_css: |
            :root {
              --color-term-background: #0d0d0d;
              --color-term-primary: #39ff14;
              --color-term-secondary: #00cc00;
            }
            .terminal { background: #0d0d0d !important; }
            .term-text, text { fill: #39ff14 !important; color: #39ff14 !important; }

      # ── LANGUAGES ──────────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }

      # ── CONTRIBUTION CALENDAR ──────────────────────────────────
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }

      # ── CODING HABITS ──────────────────────────────────────────
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }

      # ── RECENT ACTIVITY ────────────────────────────────────────
      - name: Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, review, release
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }

      # ── LEETCODE ───────────────────────────────────────────────
      - name: LeetCode
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.leetcode.svg
          token: NOT_NEEDED
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_leetcode: yes
          plugin_leetcode_user: ayushharyan19
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 6
          plugin_leetcode_limit_recent: 3
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }

      # ── ACHIEVEMENTS ───────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }

      # ── WORLDMAP ───────────────────────────────────────────────
      - name: Worldmap
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.worldmap.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_stargazers: yes
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_sample: 200
          extras_css: |
            .terminal { background: #0d0d0d !important; }
            text { fill: #39ff14 !important; }
