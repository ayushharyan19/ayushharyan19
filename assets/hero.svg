<svg xmlns="http://www.w3.org/2000/svg" width="850" height="400" viewBox="0 0 850 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050a"/>
      <stop offset="40%" stop-color="#0f0f1a"/>
      <stop offset="70%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="28%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes t1{0%,100%{opacity:.15}50%{opacity:1}}
      @keyframes t2{0%,100%{opacity:.5}50%{opacity:.08}}
      @keyframes t3{0%,100%{opacity:.08}50%{opacity:.85}}
      @keyframes gl{0%,100%{opacity:.35}50%{opacity:1}}
      .s1{animation:t1 3s ease-in-out infinite}
      .s2{animation:t2 4s ease-in-out infinite}
      .s3{animation:t3 2.5s ease-in-out infinite}
      .dm{animation:gl 2s ease-in-out infinite}
    </style>
  </defs>

  <!-- Background -->
  <rect width="850" height="400" fill="url(#bg)" rx="12"/>

  <!-- Golden aura behind name -->
  <ellipse cx="425" cy="155" rx="280" ry="110" fill="url(#glow)"/>

