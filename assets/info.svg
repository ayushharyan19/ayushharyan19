<svg xmlns="http://www.w3.org/2000/svg" width="860" height="225" viewBox="0 0 860 225">

  <!-- Background -->
  <rect width="860" height="225" fill="#07070f" rx="10"/>

  <!-- Left gold accent bar -->
  <rect x="0" y="0" width="5" height="225" fill="#FFD700" rx="0" opacity="0.85"/>

  <!-- Right gold accent bar (subtle) -->
  <rect x="855" y="0" width="5" height="225" fill="#FFD700" rx="0" opacity="0.35"/>

  <!-- Bottom gold divider line -->
  <line x1="5" y1="223" x2="855" y2="223" stroke="#FFD700" stroke-width="1" opacity="0.25"/>

  <!-- Row 1: Name -->
  <text x="36" y="40"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" fill="#FFD700">Name</text>
  <text x="185" y="40"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#555">:</text>
  <text x="205" y="40"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#ddd">Ayush Aryan</text>

  <!-- Row 2: Role -->
  <text x="36" y="75"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" fill="#FFD700">Role</text>
  <text x="185" y="75"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#555">:</text>
  <text x="205" y="75"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#ddd">AI Agent Builder</text>

  <!-- Row 3: Institute -->
  <text x="36" y="110"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" fill="#FFD700">Institute</text>
  <text x="185" y="110"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#555">:</text>
  <text x="205" y="110"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#ddd">Vedam School of Technology</text>

  <!-- Row 4: Craft -->
  <text x="36" y="145"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" fill="#FFD700">Craft</text>
  <text x="185" y="145"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#555">:</text>
  <text x="205" y="145"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#ddd">Fordge Factory - AI Agent Solutions</text>

  <!-- Row 5: Arena -->
  <text x="36" y="180"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" fill="#FFD700">Arena</text>
  <text x="185" y="180"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#555">:</text>
  <text x="205" y="180"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#ddd">DSA in Java</text>

  <!-- Row 6: Spirit -->
  <text x="36" y="210"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" fill="#FFD700">Spirit</text>
  <text x="185" y="210"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#555">:</text>
  <text x="205" y="210"
        font-family="'Courier New', Courier, monospace"
        font-size="15" fill="#ddd">Always Building, Always Shipping</text>
</svg>
