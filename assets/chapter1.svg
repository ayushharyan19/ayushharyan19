<svg xmlns="http://www.w3.org/2000/svg" width="850" height="260" viewBox="0 0 850 260">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#10101a"/>
    </linearGradient>
    <linearGradient id="moonGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="260" fill="url(#cbg)" rx="10"/>

  <!-- Gold bottom border -->
  <line x1="0" y1="257" x2="850" y2="257" stroke="#FFD700" stroke-width="3" opacity="0.75"/>

  <!-- Left gold accent bar -->
  <rect x="0" y="0" width="5" height="260" fill="#FFD700" rx="0" opacity="0.8"/>

  <!-- Decorative dots -->
  <circle cx="28" cy="20" r="2.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="28" cy="240" r="2.5" fill="#FFD700" opacity="0.3"/>

  <!-- CHAPTER I label -->
  <text x="48" y="58" font-family="Courier New, monospace" font-size="12" fill="#FFD700" letter-spacing="6" opacity="0.8">C H A P T E R   I</text>

  <!-- Who Am I? heading -->
  <text x="48" y="115" font-family="Georgia, Times New Roman, serif" font-size="46" font-weight="bold" fill="#FFD700">Who Am I?</text>

  <!-- Gold underline -->
  <rect x="48" y="124" width="260" height="2.5" fill="#FFD700" opacity="0.5" rx="1"/>

  <!-- Description lines -->
  <text x="48" y="165" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#D4AF37" font-style="italic" opacity="0.9">Every great creation begins in darkness.</text>
  <text x="48" y="192" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#D4AF37" font-style="italic" opacity="0.9">I transform raw ideas into living, breathing applications.</text>

  <!-- ============ RIGHT SIDE: GOTHAM SCENE ============ -->

  <!-- Moon glow -->
  <circle cx="700" cy="55" r="50" fill="#FFD700" opacity="0.06"/>
  <!-- Moon crescent -->
  <circle cx="700" cy="55" r="32" fill="#1a1a28"/>
  <circle cx="685" cy="48" r="28" fill="#14141f"/>

  <!-- Stars near moon -->
  <circle cx="740" cy="30" r="1.2" fill="#FFD700" opacity="0.6"/>
  <circle cx="758" cy="52" r="0.9" fill="#FFD700" opacity="0.5"/>
  <circle cx="720" cy="22" r="1" fill="#FFD700" opacity="0.4"/>
  <circle cx="770" cy="38" r="0.8" fill="#FFD700" opacity="0.55"/>
  <circle cx="682" cy="18" r="1.1" fill="#FFD700" opacity="0.45"/>
  <circle cx="798" cy="28" r="0.9" fill="#FFD700" opacity="0.5"/>
  <circle cx="812" cy="60" r="1" fill="#FFD700" opacity="0.4"/>
  <circle cx="660" cy="30" r="0.8" fill="#FFD700" opacity="0.4"/>
  <circle cx="830" cy="42" r="0.7" fill="#FFD700" opacity="0.35"/>

  <!-- Bat signal beam (faint triangle of light) -->
  <polygon points="700,215 670,90 728,90" fill="#FFD700" opacity="0.025"/>
  <ellipse cx="700" cy="218" rx="55" ry="12" fill="#FFD700" opacity="0.07"/>

  <!-- Bat symbol in beam -->
  <path d="M700,185 C696,181 689,186 686,180 C683,174 690,170 693,173 C695,170 698,164 700,162 C702,164 705,170 707,173 C710,170 717,174 714,180 C711,186 704,181 700,185Z" fill="#FFD700" opacity="0.22"/>

  <!-- City silhouette buildings -->
  <rect x="580" y="165" width="22" height="95" fill="#0d0d18" rx="1"/>
  <rect x="606" y="150" width="16" height="110" fill="#111120" rx="1"/>
  <rect x="626" y="135" width="28" height="125" fill="#0d0d18" rx="1"/>
  <rect x="658" y="148" width="20" height="112" fill="#111120" rx="1"/>
  <rect x="682" y="130" width="14" height="130" fill="#0d0d18" rx="1"/>
  <!-- Tallest center building (Wayne Tower!) -->
  <rect x="698" y="110" width="10" height="150" fill="#121220" rx="1"/>
  <rect x="694" y="106" width="18" height="8" fill="#111120" rx="1"/>
  <!-- antenna -->
  <line x1="703" y1="106" x2="703" y2="92" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <circle cx="703" cy="91" r="1.5" fill="#FFD700" opacity="0.7"/>

  <rect x="712" y="135" width="18" height="125" fill="#0d0d18" rx="1"/>
  <rect x="734" y="148" width="22" height="112" fill="#111120" rx="1"/>
  <rect x="760" y="155" width="16" height="105" fill="#0d0d18" rx="1"/>
  <rect x="780" y="142" width="26" height="118" fill="#111120" rx="1"/>
  <rect x="810" y="162" width="18" height="98" fill="#0d0d18" rx="1"/>
  <rect x="832" y="155" width="18" height="105" fill="#111120" rx="1"/>

  <!-- Building windows (golden lights) -->
  <rect x="630" y="145" width="3" height="3" fill="#FFD700" opacity="0.5"/>
  <rect x="637" y="158" width="3" height="3" fill="#FFD700" opacity="0.35"/>
  <rect x="630" y="170" width="3" height="3" fill="#FFD700" opacity="0.4"/>
  <rect x="644" y="148" width="3" height="3" fill="#FFD700" opacity="0.3"/>
  <rect x="662" y="160" width="3" height="3" fill="#FFD700" opacity="0.45"/>
  <rect x="669" y="175" width="3" height="3" fill="#FFD700" opacity="0.3"/>
  <rect x="686" y="142" width="3" height="3" fill="#FFD700" opacity="0.4"/>
  <rect x="702" y="120" width="2" height="2" fill="#FFD700" opacity="0.6"/>
  <rect x="714" y="148" width="3" height="3" fill="#FFD700" opacity="0.4"/>
  <rect x="720" y="162" width="3" height="3" fill="#FFD700" opacity="0.3"/>
  <rect x="738" y="158" width="3" height="3" fill="#FFD700" opacity="0.45"/>
  <rect x="745" y="170" width="3" height="3" fill="#FFD700" opacity="0.35"/>
  <rect x="784" y="152" width="3" height="3" fill="#FFD700" opacity="0.4"/>
  <rect x="790" y="168" width="3" height="3" fill="#FFD700" opacity="0.3"/>
  <rect x="608" y="162" width="3" height="3" fill="#FFD700" opacity="0.35"/>
  <rect x="583" y="175" width="3" height="3" fill="#FFD700" opacity="0.3"/>
  <rect x="814" y="170" width="3" height="3" fill="#FFD700" opacity="0.35"/>
  <rect x="835" y="165" width="3" height="3" fill="#FFD700" opacity="0.4"/>

  <!-- Batman figure standing on Wayne Tower rooftop -->
  <!-- Body -->
  <rect x="696" y="82" width="14" height="18" fill="#FFD700" opacity="0.75" rx="2"/>
  <!-- Head with ears -->
  <path d="M697,82 L699,74 L701,79 L703,74 L705,79 L707,74 L709,82 Z" fill="#FFD700" opacity="0.75"/>
  <!-- Cape left -->
  <path d="M696,85 Q682,100 685,115 L696,100 Z" fill="#FFD700" opacity="0.6"/>
  <!-- Cape right -->
  <path d="M710,85 Q724,100 721,115 L710,100 Z" fill="#FFD700" opacity="0.6"/>
  <!-- Belt (dark stripe) -->
  <rect x="696" y="96" width="14" height="2" fill="#0a0a10" opacity="0.8"/>
  <!-- Legs -->
  <rect x="698" y="100" width="5" height="6" fill="#FFD700" opacity="0.65" rx="1"/>
  <rect x="703" y="100" width="5" height="6" fill="#FFD700" opacity="0.65" rx="1"/>
</svg>
