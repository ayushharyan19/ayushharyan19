<svg xmlns="http://www.w3.org/2000/svg" width="850" height="260" viewBox="0 0 850 260">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#10101a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
      .fade{animation:fadeIn 1.5s ease-in-out forwards}
    </style>
  </defs>

  <!-- Background -->
  <rect width="850" height="260" fill="url(#cbg)" rx="12"/>

  <!-- Gold bottom border -->
  <line x1="0" y1="257" x2="850" y2="257" stroke="#FFD700" stroke-width="3" opacity="0.8"/>

  <!-- Left gold accent bar -->
  <rect x="0" y="25" width="4" height="210" fill="#FFD700" rx="2" opacity="0.7"/>

  <!-- Decorative dot top-left -->
  <circle cx="40" cy="25" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="40" cy="138" r="2" fill="#FFD700" opacity="0.3"/>

  <!-- CHAPTER I label -->
  <text x="45" y="62" font-family="'Courier New',monospace" font-size="13" fill="#FFD700" letter-spacing="5" opacity="0.85" class="fade">C H A P T E R &nbsp; I</text>

  <!-- Who Am I? heading -->
  <text x="45" y="115" font-family="Georgia,'Times New Roman',serif" font-size="44" font-weight="bold" fill="#FFD700" class="fade" style="animation-delay:.3s">Who Am I?</text>

  <!-- Underline -->
  <line x1="45" y1="125" x2="290" y2="125" stroke="#FFD700" stroke-width="2.5" opacity="0.55"/>

  <!-- Philosophical text -->
  <text x="45" y="168" font-family="Georgia,'Times New Roman',serif" font-size="15" fill="#d4af37" font-style="italic" opacity="0.88" class="fade" style="animation-delay:.6s">Every great creation begins in darkness.</text>
  <text x="45" y="195" font-family="Georgia,'Times New Roman',serif" font-size="15" fill="#d4af37" font-style="italic" opacity="0.88" class="fade" style="animation-delay:.9s">I transform raw ideas into living, breathing applications.</text>

  <!-- ═══ Right Side: Gotham Scene ═══ -->
  <g transform="translate(580, 15)">
    <!-- Moon -->
    <circle cx="120" cy="40" r="32" fill="#FFD700" opacity="0.12"/>
    <circle cx="130" cy="35" r="28" fill="#0a0a10"/>

    <!-- Bat signal glow -->
    <ellipse cx="120" cy="120" rx="70" ry="25" fill="#FFD700" opacity="0.04"/>
    <polygon points="120,180 100,60 140,60" fill="#FFD700" opacity="0.03"/>

    <!-- City silhouette -->
    <rect x="0" y="155" width="22" height="60" fill="#14141e" rx="1"/>
    <rect x="26" y="140" width="16" height="75" fill="#18182a" rx="1"/>
    <rect x="46" y="125" width="28" height="90" fill="#14141e" rx="1"/>
    <rect x="78" y="135" width="20" height="80" fill="#18182a" rx="1"/>
    <rect x="102" y="120" width="24" height="95" fill="#14141e" rx="1"/>
    <rect x="130" y="140" width="18" height="75" fill="#18182a" rx="1"/>
    <rect x="152" y="130" width="22" height="85" fill="#14141e" rx="1"/>
    <rect x="178" y="150" width="16" height="65" fill="#18182a" rx="1"/>
    <rect x="198" y="145" width="20" height="70" fill="#14141e" rx="1"/>
    <rect x="222" y="155" width="15" height="60" fill="#18182a" rx="1"/>

    <!-- Building window lights -->
    <rect x="52" y="135" width="2.5" height="2.5" fill="#FFD700" opacity="0.4"/>
    <rect x="58" y="148" width="2.5" height="2.5" fill="#FFD700" opacity="0.3"/>
    <rect x="52" y="162" width="2.5" height="2.5" fill="#FFD700" opacity="0.35"/>
    <rect x="64" y="155" width="2.5" height="2.5" fill="#FFD700" opacity="0.25"/>
    <rect x="108" y="132" width="2.5" height="2.5" fill="#FFD700" opacity="0.4"/>
    <rect x="115" y="148" width="2.5" height="2.5" fill="#FFD700" opacity="0.3"/>
    <rect x="108" y="165" width="2.5" height="2.5" fill="#FFD700" opacity="0.35"/>
    <rect x="156" y="142" width="2.5" height="2.5" fill="#FFD700" opacity="0.3"/>
    <rect x="162" y="158" width="2.5" height="2.5" fill="#FFD700" opacity="0.25"/>
    <rect x="84" y="145" width="2.5" height="2.5" fill="#FFD700" opacity="0.35"/>
    <rect x="88" y="160" width="2.5" height="2.5" fill="#FFD700" opacity="0.25"/>
    <rect x="204" y="155" width="2.5" height="2.5" fill="#FFD700" opacity="0.3"/>
    <rect x="34" y="152" width="2.5" height="2.5" fill="#FFD700" opacity="0.3"/>
    <rect x="136" y="155" width="2.5" height="2.5" fill="#FFD700" opacity="0.35"/>

    <!-- Figure silhouette on building -->
    <rect x="106" y="103" width="14" height="18" fill="#0d0d15" rx="2"/>
    <circle cx="113" cy="96" r="7" fill="#0d0d15"/>
    <!-- Cape -->
    <path d="M120,108 Q138,120 130,150 L120,138 Z" fill="#0d0d15" opacity="0.9"/>
    <path d="M106,108 Q92,118 96,148 L106,135 Z" fill="#0d0d15" opacity="0.8"/>
  </g>
</svg>
