<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Preview — Ayush Aryan</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 880px;
      width: 100%;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #30363d;
    }
    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #FFD700;
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 600; color: #FFD700; }
    .profile-sub { font-size: 13px; color: #8b949e; }
    .readme-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #8b949e;
    }
    .readme-badge span { color: #e6edf3; font-weight: 600; }
    .readme-content {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 32px;
    }
    .readme-content img {
      width: 100%;
      height: auto;
      display: block;
    }
    .readme-content hr {
      border: none;
      border-top: 1px solid #30363d;
      margin: 24px 0;
    }
    .section-gap { height: 8px; }
    .label {
      text-align: center;
      color: #484f58;
      font-size: 11px;
      margin-top: 24px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Simulated GitHub profile header -->
    <div class="profile-header">
      <div class="avatar-circle">
        <img src="assets/avatar.png" alt="Avatar">
      </div>
      <div>
        <div class="profile-name">Ayush Aryan</div>
        <div class="profile-sub">ayushharyan19 / README.md</div>
      </div>
    </div>

    <!-- README badge -->
    <div class="readme-badge">
      📄 <span>README.md</span>
    </div>

    <!-- README content -->
    <div class="readme-content">
      <!-- Hero Banner -->
      <img src="assets/hero.svg" alt="Hero Banner"/>

      <hr/>

      <!-- Chapter I -->
      <img src="assets/chapter1.svg" alt="Chapter I — Who Am I?"/>

      <div class="section-gap"></div>

      <!-- Info Card -->
      <img src="assets/info.svg" alt="Info Card"/>

      <hr/>
    </div>

    <div class="label">✦ BATMAN THEME — BLACK & GOLD ✦</div>
  </div>
</body>
</html>
