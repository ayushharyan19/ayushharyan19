<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Preview</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding: 40px 20px;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 30px 40px;
  }
  .container img { max-width: 100%; }
  .container table {
    border-collapse: collapse;
    margin: 10px auto;
  }
  .container td, .container th {
    border: 1px solid #30363d;
    padding: 8px 16px;
  }
  .container h2 { color: #c9d1d9; margin: 20px 0 10px; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
  .container h3 { color: #c9d1d9; margin: 16px 0 8px; }
  .container a { color: #58a6ff; text-decoration: none; }
  .container a:hover { text-decoration: underline; }
  .container code { background: #1f2937; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  .container pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; overflow-x: auto; }
  .container blockquote { border-left: 3px solid #3b82f6; padding-left: 16px; color: #8b949e; margin: 12px 0; }
  .container hr { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
  .container b, .container strong { color: #c9d1d9; }
</style>
</head>
<body>
<div class="container" id="content"></div>
<script>
fetch('README.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  });
</script>
</body>
</html>
